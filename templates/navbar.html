{% load static %}
<!-- Modern Animated Navigation -->
<nav class="bg-gray-950/85 backdrop-blur-lg sticky top-0 z-50 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <a href="{% url 'myapp:home' %}" class="flex items-center gap-2 group">
                <img src="{% static 'images/logo.png' %}" alt="Admitionwala Logo" class="h-12 w-auto object-contain transform group-hover:scale-105 transition-transform">
            </a>
            
            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-8">
                <a href="{% url 'myapp:home' %}#solutions" class="text-gray-300 hover:text-emerald-400 transition duration-300 font-medium">Services</a>
                <a href="{% url 'myapp:about' %}" class="text-gray-300 hover:text-emerald-400 transition duration-300 font-medium">About</a>
                <a href="{% url 'myapp:portfolio' %}" class="text-gray-300 hover:text-emerald-400 transition duration-300 font-medium">Portfolio</a>
                <a href="{% url 'myapp:careers' %}" class="text-gray-300 hover:text-emerald-400 transition duration-300 font-medium">Careers</a>
                <a href="{% url 'myapp:contact' %}" class="text-gray-300 hover:text-emerald-400 transition duration-300 font-medium">Contact</a>
            </div>
            
            <!-- CTA Button -->
            <a href="{% url 'myapp:contact' %}" class="hidden md:block px-6 py-2.5 bg-gradient-to-r from-sky-500 to-emerald-500 text-white rounded-lg font-medium hover:shadow-emerald-500/30 shadow-lg transform hover:scale-105 transition-all">
                Get Started
            </a>
            
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden text-gray-300 hover:text-white text-2xl transition">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="md:hidden hidden pb-6 pt-2 space-y-3 animate-slideDown border-t border-gray-800 mt-2">
            <a href="{% url 'myapp:home' %}#solutions" class="block text-gray-300 hover:text-emerald-400 py-2 font-medium">Services</a>
            <a href="{% url 'myapp:about' %}" class="block text-gray-300 hover:text-emerald-400 py-2 font-medium">About</a>
            <a href="{% url 'myapp:portfolio' %}" class="block text-gray-300 hover:text-emerald-400 py-2 font-medium">Portfolio</a>
            <a href="{% url 'myapp:careers' %}" class="block text-gray-300 hover:text-emerald-400 py-2 font-medium">Careers</a>
            <a href="{% url 'myapp:contact' %}" class="block text-gray-300 hover:text-emerald-400 py-2 font-medium">Contact</a>
            <a href="{% url 'myapp:contact' %}" class="block mt-4 px-4 py-3 bg-gradient-to-r from-sky-500 to-emerald-500 text-white rounded-lg text-center font-bold shadow-lg">Get Started</a>
        </div>
    </div>
</nav>

<script>
    document.getElementById('mobile-menu-btn').addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
    });
</script>
