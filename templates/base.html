{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admitionwala IT Services - Enterprise AI, Cloud Solutions, and Digital Transformation for sustainable business growth.">
    <meta name="keywords" content="Admitionwala, IT Services, Enterprise AI, Cloud Solutions, Digital Transformation, UK IT Outsourcing, Business Automation">
    <meta name="author" content="Admitionwala IT Services">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:title" content="{% block og_title %}Admitionwala IT Services - Digital Solutions{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Admitionwala IT Services - Enterprise AI, Cloud Solutions, and Digital Transformation for sustainable business growth.{% endblock %}">
    <meta property="og:image" content="{% static 'images/og-image.png' %}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ request.build_absolute_uri }}">
    <meta property="twitter:title" content="{% block twitter_title %}Admitionwala IT Services - Digital Solutions{% endblock %}">
    <meta property="twitter:description" content="{% block twitter_description %}Admitionwala IT Services - Enterprise AI, Cloud Solutions, and Digital Transformation for sustainable business growth.{% endblock %}">
    <meta property="twitter:image" content="{% static 'images/twitter-image.png' %}">

    <title>{% block title %}Admitionwala IT Services - Digital Solutions{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Modern Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="{% static 'css/logo-theme.css' %}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Monochromatic 'Sky' Palette (Main Theme - Black)
                        sky: {
                            50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
                            400: '#a3a3a3', 500: '#000000', 600: '#171717', 700: '#262626',
                            800: '#404040', 900: '#525252', 950: '#0a0a0a'
                        },
                        // Monochromatic 'Emerald' Palette (Secondary Theme - Dark Gray)
                        emerald: {
                            50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
                            400: '#a3a3a3', 500: '#262626', 600: '#404040', 700: '#525252',
                            800: '#737373', 900: '#a3a3a3', 950: '#171717'
                        },
                        // Map Purple to Main for site-wide consistency
                        purple: {
                            50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
                            400: '#a3a3a3', 500: '#000000', 600: '#171717', 700: '#262626',
                            800: '#404040', 900: '#525252', 950: '#0a0a0a'
                        },
                        // Map Pink to Secondary for site-wide consistency
                        pink: {
                            50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
                            400: '#a3a3a3', 500: '#262626', 600: '#404040', 700: '#525252',
                            800: '#737373', 900: '#a3a3a3', 950: '#171717'
                        },
                        // Ultra Premium Dark Text Colors (Slate)
                        gray: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a', 950: '#020617'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.02em;
        }
        
        .font-bold, .font-black {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        
        .animate-fadeInUp { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
        .fadeInUp-trigger { opacity: 1 !important; transform: translateY(0) !important; }
        
        .animate-fadeInLeft { animation: fadeInLeft 0.8s ease-out; }
        .animate-fadeInRight { animation: fadeInRight 0.8s ease-out; }
        .animate-slideDown { animation: slideDown 0.5s ease-out; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .gradient-text {
            background: linear-gradient(135deg, #000000 0%, #404040 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-white overflow-x-hidden">
    {% include 'navbar.html' %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    {% include 'footer.html' %}
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if(target) target.scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('animate-fadeInUp');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        
        document.querySelectorAll('[data-scroll]').forEach(el => observer.observe(el));
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
